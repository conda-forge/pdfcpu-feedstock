schema_version: 1

context:
  version: "0.12.0"

package:
  name: pdfcpu
  version: ${{ version }}

source:
  url: https://github.com/pdfcpu/pdfcpu/archive/v${{ version }}.tar.gz
  sha256: 5c39e754c465709ced7f62289a837a37808bf48f355b8ef4608cfa9d8e32536f

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - pdfcpu help

about:
  license: Apache-2.0
  license_file:
    - LICENSE.txt
    - license-files/
  summary: PDF processor written in Go
  homepage: https://github.com/pdfcpu/pdfcpu
  repository: https://github.com/pdfcpu/pdfcpu

extra:
  recipe-maintainers:
    - danielnachun
